kind: hosted
name: contoso-support-agent
description: This Agent can access and search Contoso customer support information using MCP (Model Context Protocol).
metadata:
    authors:
        - heena
    tags:
        - Microsoft Foundry Hosted-Agent
        - MCP
        - Microsoft Agent Framework
protocols:
    - protocol: responses
      version: v1
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-4o-mini
    - name: MCP_SERVICE_URL
      value: <your-mcp-service-url>/mcp